version: '3.9'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: dental_base
      POSTGRES_USER: dental
      POSTGRES_PASSWORD: dental123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    command: >
      bash -c "cd /DENTAL_CRM/src &&
               python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/DENTAL_CRM
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
    depends_on:
      - db
    restart: on-failure

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data:
