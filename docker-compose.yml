version: '3.9'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: dental_base
      POSTGRES_USER: dental
      POSTGRES_PASSWORD: dental123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    command: >
      bash -c "cd /DENTAL_CRM/backend/src &&
               python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/DENTAL_CRM
      - media_files:/DENTAL_CRM/backend/src/media
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PASSWORD=dental123
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: on-failure

  celery:
    build: .
    command: >
      bash -c "cd /DENTAL_CRM/backend/src &&
               celery -A dental worker -l info -Q default,reminders"
    volumes:
      - .:/DENTAL_CRM
      - media_files:/DENTAL_CRM/backend/src/media
    environment:
      - DB_HOST=db
      - DB_PASSWORD=dental123
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: on-failure

  celery-beat:
    build: .
    command: >
      bash -c "cd /DENTAL_CRM/backend/src &&
               celery -A dental beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    volumes:
      - .:/DENTAL_CRM
      - media_files:/DENTAL_CRM/backend/src/media
    environment:
      - DB_HOST=db
      - DB_PASSWORD=dental123
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: on-failure

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data:
  media_files:
